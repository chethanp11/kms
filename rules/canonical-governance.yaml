rules:
  - id: rule.page_requires_common_sections
    description: Canonical pages must include the common required sections before publication.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: error
    condition:
      all:
        - field: page.non_empty_sections
          operator: contains_all
          value:
            - Summary
            - Current Understanding
            - Source Trace
    action: block_publish

  - id: rule.source_trace_requires_references
    description: Canonical pages must carry at least one source reference.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: error
    condition:
      all:
        - field: frontmatter.source_refs
          operator: exists
        - field: frontmatter.source_refs
          operator: min_items
          value: 1
    action: block_publish

  - id: rule.review_required_flag_escalates
    description: Drafts flagged for review must surface through the approval gate.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: warning
    condition:
      all:
        - field: frontmatter.review_required
          operator: equals
          value: true
    action: escalate_review

  - id: rule.low_confidence_requires_review
    description: Low, medium, and provisional confidence pages require human review.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: warning
    condition:
      all:
        - field: frontmatter.confidence
          operator: in
          value:
            - low
            - medium
            - provisional
    action: escalate_review

  - id: rule.new_canonical_metric_requires_approval
    description: New canonical metrics require approval before publication.
    scope:
      page_types:
        - metric
    severity: warning
    condition:
      all:
        - field: revision.change_type
          operator: equals
          value: create
    action: escalate_review

  - id: rule.new_canonical_data_asset_requires_approval
    description: New canonical data assets require approval before publication.
    scope:
      page_types:
        - data-asset
    severity: warning
    condition:
      all:
        - field: revision.change_type
          operator: equals
          value: create
    action: escalate_review

  - id: rule.contradiction_blocks_publish
    description: High-severity contradictions block publication.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: error
    condition:
      all:
        - field: contradictions.max_severity
          operator: equals
          value: error
    action: block_publish

  - id: rule.contradiction_requires_review
    description: Medium-severity contradictions require human review.
    scope:
      page_types:
        - domain
        - entity
        - process
        - concept
        - decision
        - metric
        - data-asset
        - analysis-pattern
        - validation-rule
        - source-note
        - open-question
    severity: warning
    condition:
      all:
        - field: contradictions.max_severity
          operator: equals
          value: warning
    action: escalate_review
